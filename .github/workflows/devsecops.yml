name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# إضافة الصلاحيات اللازمة لرفع التقارير لتبويب الـ Security
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # 1. المرحلة الأولى: فحص الكود والأسرار (SAST)
  sast_scans:
    name: SAST Scans (CodeQL & Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # أداة Gitleaks للبحث عن كلمات السر المسربة
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # رفع نتائج Gitleaks لتظهر في الـ Security Tab
      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'gitleaks-results.sarif'
          category: 'gitleaks'

      # أداة CodeQL لفحص أخطاء البرمجة في JavaScript
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # 2. المرحلة الثانية: فحص الـ Docker Image (SCA)
  container_security:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t trapoops-image .

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'trapoops-image'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # 3. المرحلة الثالثة: فحص الموقع وهو شغال (DAST)
  dast_scan:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [sast_scans, container_security]
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          # الرابط الخاص بكِ على Railway
          target: 'https://trapoops-production.up.railway.app'
          # منع الأداة من محاولة فتح Issues لنتجنب خطأ الصلاحيات
          issue_title: 'ZAP Security Scan Report'
        continue-on-error: true